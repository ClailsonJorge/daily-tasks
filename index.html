<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Tasks</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--text:#222;--border:#ddd}
.dark{--bg:#121212;--card:#1e1e1e;--text:#eee;--border:#444}
body{margin:0;font-family:Arial;background:var(--bg);color:var(--text)}
.header{display:flex;gap:8px;align-items:center;padding:10px;background:var(--card);border-bottom:1px solid var(--border)}
button,input{padding:8px}
.layout{display:grid;grid-template-columns:280px 1fr;height:calc(100vh - 60px)}
.panel{border-right:1px solid var(--border);overflow:auto;padding:10px}
.main{padding:10px;overflow:auto}
.day{padding:8px;border:1px solid var(--border);margin:4px 0;cursor:pointer}
.task{margin-left:20px}
.row{display:flex;align-items:center;gap:6px;margin:4px 0}
.progress{font-size:12px;opacity:.7}
pre{background:#000;color:#0f0;padding:10px;max-height:250px;overflow:auto}
</style>
</head>
<body>
<div class="header">
<button onclick="newDay()">Novo Dia</button>
<button onclick="copyPending()">Copiar Pendências</button>
<button onclick="exportDay()">Exportar Dia</button>
<button onclick="exportAll()">Exportar Tudo</button>
<button onclick="toggleTheme()">Tema</button>
<input id="search" placeholder="Buscar..." oninput="renderSearch()">
<input type="file" onchange="importJson(event)">
</div>

<div class="layout">
<div class="panel">
<h3>Histórico</h3>
<div id="history"></div>
<div id="searchResults"></div>
</div>
<div class="main">
<input type="date" id="date" onchange="loadDay(this.value)">
<div>
<input id="newTask" placeholder="Nova tarefa">
<button onclick="addTask()">Adicionar</button>
</div>
<div id="tasks"></div>
<h3>JSON</h3>
<pre id="json"></pre>
</div>
</div>

<script>
const KEY="dailyTasksV1";
let db=JSON.parse(localStorage.getItem(KEY)||'{"settings":{"dark":false},"todos":{}}');
let current=today();

function save(){localStorage.setItem(KEY,JSON.stringify(db));}
function today(){return new Date().toISOString().split('T')[0];}

function ensureDay(d){
 if(!db.todos[d]) db.todos[d]={date:d,tasks:[]};
 save();
}
function uid(){return Date.now()+Math.random().toString(36).slice(2);}

function newDay(){ensureDay(today());loadDay(today());renderHistory();}
function loadDay(d){ensureDay(d);current=d;date.value=d;renderTasks();}

function addTask(parent=null){
 const txt=document.getElementById('newTask').value.trim();
 if(!txt)return;
 const t={id:uid(),title:txt,done:false,open:true,children:[]};
 if(parent) parent.children.push(t);
 else db.todos[current].tasks.push(t);
 document.getElementById('newTask').value='';
 save();renderTasks();
}

function renderHistory(){
 history.innerHTML='';
 Object.keys(db.todos).sort().reverse().forEach(d=>{
  const el=document.createElement('div');
  el.className='day';
  el.textContent=d;
  el.onclick=()=>loadDay(d);
  history.appendChild(el);
 });
}

function stats(t){
 let total=1,done=t.done?1:0;
 t.children.forEach(c=>{let s=stats(c);total+=s.total;done+=s.done});
 return {total,done};
}

function renderNode(t,parentEl,parentRef){
 const div=document.createElement('div');
 div.className='task';
 const s=stats(t);
 div.innerHTML=`<div class=row>
 <button>${t.open?'▼':'▶'}</button>
 <input type=checkbox ${t.done?'checked':''}>
 <span>${t.title}</span>
 <span class=progress>${s.done}/${s.total}</span>
 <button>+</button>
 <button>x</button></div>`;

 const [toggle,chk,, ,add,del]=div.querySelectorAll('button,input,span,span,button,button');

 toggle.onclick=()=>{t.open=!t.open;save();renderTasks();}
 chk.onchange=e=>{markRecursive(t,e.target.checked);save();renderTasks();}
 add.onclick=()=>{
   const name=prompt("Subtarefa:");
   if(name){t.children.push({id:uid(),title:name,done:false,open:true,children:[]});save();renderTasks();}
 }
 del.onclick=()=>{
   const arr=parentRef||db.todos[current].tasks;
   arr.splice(arr.indexOf(t),1);
   save();renderTasks();
 }

 parentEl.appendChild(div);
 if(t.open){
   t.children.forEach(c=>renderNode(c,parentEl,t.children));
 }
}

function markRecursive(t,v){t.done=v;t.children.forEach(c=>markRecursive(c,v));}

function renderTasks(){
 ensureDay(current);
 tasks.innerHTML='';
 db.todos[current].tasks.forEach(t=>renderNode(t,tasks,null));
 save();
}

function exportDay(){json.textContent=JSON.stringify(db.todos[current],null,2);}
function exportAll(){json.textContent=JSON.stringify(db,null,2);}

function copyPending(){
 const dates=Object.keys(db.todos).sort();
 const idx=dates.indexOf(current);
 if(idx<1)return;
 const prev=db.todos[dates[idx-1]].tasks;
 ensureDay(current);
 function clonePending(arr){
   return arr.filter(x=>!x.done).map(x=>({
    id:uid(),title:x.title,done:false,open:true,children:clonePending(x.children)
   }));
 }
 db.todos[current].tasks.push(...clonePending(prev));
 save();renderTasks();
}

function renderSearch(){
 const q=search.value.toLowerCase();
 searchResults.innerHTML='';
 if(!q)return;
 function walk(node,date,path){
   if(node.title.toLowerCase().includes(q)){
     const d=document.createElement('div');
     d.textContent=date+" > "+path+node.title;
     searchResults.appendChild(d);
   }
   node.children.forEach(c=>walk(c,date,path+node.title+" > "));
 }
 Object.values(db.todos).forEach(day=>day.tasks.forEach(t=>walk(t,day.date,"")));
}

function toggleTheme(){
 db.settings.dark=!db.settings.dark;
 document.body.classList.toggle('dark',db.settings.dark);
 save();
}

function importJson(e){
 const f=e.target.files[0];
 if(!f)return;
 const r=new FileReader();
 r.onload=()=>{
   db=JSON.parse(r.result);
   save();location.reload();
 };
 r.readAsText(f);
}

if(db.settings.dark) document.body.classList.add('dark');
loadDay(today());
renderHistory();
</script>
</body>
</html>
